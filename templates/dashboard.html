<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銷售數據儀表板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="mb-4 text-primary fw-bold border-bottom pb-3">銷售數據儀表板</h1>

    {% if message %}
    <div class="alert alert-{{ 'success' if '成功' in message else 'danger' }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endif %}

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-bold">1. 上傳資料</div>
        <div class="card-body">
            <form action="/upload" method="post" enctype="multipart/form-data" class="row g-3 align-items-center">
                <div class="col-auto flex-grow-1">
                    <input type="file" name="file" class="form-control" accept=".xlsx, .xls" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">上傳並分析</button>
                </div>
            </form>
            <div class="form-text text-muted mt-2">請上傳 Excel 檔案，系統將自動重新整理並顯示圖表。</div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
            <span>2. 趨勢分析</span>
            
            <form action="/" method="get" class="d-flex">
                <select name="group_by" class="form-select form-select-sm me-2" onchange="this.form.submit()">
                    <option value="order_date" {% if current_group == 'order_date' %}selected{% endif %}>依日期 (每日營收)</option>
                    <option value="category" {% if current_group == 'category' %}selected{% endif %}>依產品類別</option>
                    <option value="sales_rep" {% if current_group == 'sales_rep' %}selected{% endif %}>依業務人員</option>
                </select>
                <noscript><button type="submit" class="btn btn-sm btn-outline-secondary">切換</button></noscript>
            </form>
        </div>
        
        <div class="card-body text-center">
            {% if chart_html %}
                <div class="chart-container">
                    {{ chart_html | safe }}
                </div>
            {% else %}
                <div class="py-5 text-muted">
                    <p class="mb-0">尚無分析資料</p>
                    <small>請先在上上方上傳 Excel 檔案</small>
                </div>
            {% endif %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
